<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>最小搜索 Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <style>
        :root {
            --bg: #f4f1ea;
            --panel: rgba(255, 255, 255, 0.9);
            --panel-alt: #fcfaf6;
            --line: #ddd3c4;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2f6fed;
            --accent-soft: rgba(47, 111, 237, 0.08);
            --danger: #c94b53;
            --surface-strong: #f5ede2;
            --quote-bg: #f3efe7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 199, 120, 0.32), transparent 24%),
                linear-gradient(180deg, #fbf8f2 0%, #f4f1ea 100%);
            color: var(--text);
        }

        .layout {
            min-height: 100vh;
            display: flex;
            gap: 24px;
            padding: 24px;
            padding-bottom: 220px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
        }

        .main {
            flex: 1;
            min-width: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 50px rgba(120, 96, 62, 0.1);
        }

        .sidebar-panel {
            padding: 20px;
            position: sticky;
            top: 24px;
        }

        .panel + .panel {
            margin-top: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 20px;
            align-items: start;
        }

        .card {
            padding: 22px;
        }

        .header-row,
        .session-toolbar,
        .composer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .session-toolbar-card {
            grid-column: 1 / span 2;
        }

        .conversation-card,
        .answer-card {
            grid-column: 1;
        }

        .side-card {
            grid-column: 2;
            padding: 0;
            overflow: hidden;
        }

        .attachment-bar {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: #fffdfa;
            font-size: 13px;
            color: var(--text);
        }

        .chip-remove {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 0;
            font-size: 14px;
            cursor: pointer;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .meta,
        .session-time,
        .placeholder {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .session-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .session-item {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel-alt);
            padding: 14px;
            color: inherit;
            text-align: left;
            cursor: pointer;
        }

        .session-item.active {
            border-color: var(--accent);
            background: linear-gradient(180deg, var(--accent-soft), #fffdfa);
        }

        .session-item:hover {
            border-color: #3d5273;
        }

        .session-item-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .session-title {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.5;
        }

        .session-preview {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            margin-top: 16px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: #fffdfa;
            color: var(--text);
            font: inherit;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 16px;
            cursor: pointer;
            font: inherit;
            color: white;
            background: var(--accent);
        }

        button.secondary {
            color: var(--text);
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
        }

        button.danger {
            background: rgba(201, 75, 83, 0.08);
            color: #9b1c24;
            border: 1px solid rgba(201, 75, 83, 0.2);
        }

        button.small {
            padding: 7px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message-content,
        .log-item,
        .result-item {
            white-space: pre-wrap;
            line-height: 1.75;
        }

        .conversation {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            background: var(--panel-alt);
        }

        .message.user {
            border-color: rgba(47, 111, 237, 0.25);
            background: rgba(47, 111, 237, 0.06);
        }

        .message-role {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .log-item,
        .result-item {
            padding: 12px 14px;
            border-radius: 14px;
            background: var(--panel-alt);
            border: 1px solid var(--line);
        }

        .answer-shell {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .artifact-shell {
            border-top: 1px solid var(--line);
            padding-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .artifact-head,
        .artifact-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .artifact-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .artifact-item {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 12px;
            background: #fffdfa;
            color: var(--text);
            cursor: pointer;
        }

        .artifact-item.active {
            border-color: var(--accent);
            background: rgba(47, 111, 237, 0.08);
        }

        .artifact-editor {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .artifact-input,
        .artifact-content {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fffdfa;
            color: var(--text);
            padding: 12px 14px;
            font: inherit;
        }

        .artifact-content {
            min-height: 220px;
            resize: vertical;
        }

        .artifact-preview {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fffdfa;
            padding: 16px;
        }

        .answer-markdown,
        .markdown-content {
            color: var(--text);
            line-height: 1.8;
            font-size: 16px;
        }

        .answer-markdown h1,
        .answer-markdown h2,
        .answer-markdown h3,
        .answer-markdown h4,
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4 {
            margin: 1.1em 0 0.5em;
            line-height: 1.35;
        }

        .answer-markdown h1:first-child,
        .answer-markdown h2:first-child,
        .answer-markdown h3:first-child,
        .markdown-content h1:first-child,
        .markdown-content h2:first-child,
        .markdown-content h3:first-child {
            margin-top: 0;
        }

        .answer-markdown p,
        .answer-markdown ul,
        .answer-markdown ol,
        .answer-markdown blockquote,
        .markdown-content p,
        .markdown-content ul,
        .markdown-content ol,
        .markdown-content blockquote {
            margin: 0.8em 0;
        }

        .answer-markdown ul,
        .answer-markdown ol,
        .markdown-content ul,
        .markdown-content ol {
            padding-left: 1.4em;
        }

        .answer-markdown li + li,
        .markdown-content li + li {
            margin-top: 0.35em;
        }

        .answer-markdown strong,
        .markdown-content strong {
            color: #111827;
        }

        .answer-markdown code,
        .markdown-content code {
            padding: 0.12em 0.4em;
            border-radius: 8px;
            background: var(--surface-strong);
            font-size: 0.92em;
        }

        .answer-markdown pre,
        .markdown-content pre {
            overflow-x: auto;
            padding: 16px;
            border-radius: 16px;
            background: #f7f1e8;
            border: 1px solid #e5dac8;
        }

        .answer-markdown pre code,
        .markdown-content pre code {
            padding: 0;
            background: transparent;
        }

        .answer-markdown blockquote,
        .markdown-content blockquote {
            padding: 14px 16px;
            border-left: 4px solid #d2a66f;
            background: var(--quote-bg);
            border-radius: 0 14px 14px 0;
            color: #4b5563;
        }

        .answer-markdown hr,
        .markdown-content hr {
            border: 0;
            border-top: 1px solid var(--line);
            margin: 1.2em 0;
        }

        .source-block {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: linear-gradient(180deg, #fffdfa 0%, #fbf7f1 100%);
            padding: 18px;
        }

        .source-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .source-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .source-item {
            border: 1px solid #e8dece;
            border-radius: 14px;
            background: white;
            padding: 14px 16px;
        }

        .source-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 8px;
            border-radius: 999px;
            background: #eef4ff;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
        }

        .source-title {
            font-weight: 700;
            color: #111827;
        }

        .source-snippet {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .clamped-text {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }

        .clamped-text.expanded {
            display: block;
            -webkit-line-clamp: unset;
            line-clamp: unset;
        }

        .text-toggle {
            margin-top: 8px;
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .error {
            color: #b42318;
            margin-top: 8px;
            font-size: 13px;
        }

        a {
            color: var(--accent);
        }

        .panel-toggle {
            cursor: pointer;
            list-style: none;
            padding: 18px 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-toggle::-webkit-details-marker {
            display: none;
        }

        .panel-toggle-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            padding: 0 8px;
            border-radius: 999px;
            background: #eef4ff;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
        }

        .panel-body {
            padding: 0 20px 20px;
            border-top: 1px solid var(--line);
        }

        .floating-composer {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            width: min(860px, calc(100vw - 380px));
            z-index: 30;
        }

        .composer-shell {
            padding: 16px 18px 14px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 60px rgba(120, 96, 62, 0.16);
            backdrop-filter: blur(18px);
        }

        .composer-shell textarea {
            width: 100%;
            min-height: 92px;
            resize: vertical;
            margin-top: 0;
            padding: 0;
            border: 0;
            background: transparent;
            outline: none;
        }

        .composer-status {
            min-height: 20px;
        }

        .composer-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .composer-tools {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 960px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: auto;
            }

            .sidebar-panel {
                position: static;
            }

            .session-list {
                max-height: none;
            }

            .main-grid {
                grid-template-columns: 1fr;
            }

            .session-toolbar-card,
            .conversation-card,
            .answer-card,
            .side-card {
                grid-column: 1;
            }

            .floating-composer {
                width: calc(100vw - 24px);
                bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="panel sidebar-panel">
                <div class="header-row">
                    <div>
                        <h2>历史对话</h2>
                        <p class="meta">每个会话会保存为一个 Markdown 记忆文件。</p>
                    </div>
                    <button id="new-session" class="secondary small">新建会话</button>
                </div>
                <div id="session-list" class="session-list">
                    <div class="placeholder">正在加载会话列表...</div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="main-grid">
                <section class="panel card session-toolbar-card">
                    <div class="session-toolbar">
                        <div>
                            <h1>最小搜索 Agent MVP</h1>
                            <p id="session-meta" class="meta">当前会话：新会话</p>
                        </div>
                        <button id="delete-session" class="danger" disabled>删除记忆</button>
                    </div>
                    <div>
                        <p class="meta">会话附件</p>
                        <div id="session-attachments" class="attachment-bar">
                            <span class="placeholder">当前会话还没有附件。</span>
                        </div>
                    </div>
                </section>

                <section class="panel card conversation-card">
                    <h2>当前会话内容</h2>
                    <div id="conversation" class="conversation">
                        <div class="placeholder">还没有对话记录，发送第一条消息后会自动创建会话。</div>
                    </div>
                </section>

                <section class="panel card answer-card">
                    <h2>本轮答案</h2>
                    <div class="answer-shell">
                        <div id="answer" class="answer-markdown">
                            <p class="placeholder">等待提问...</p>
                        </div>
                        <div id="sources" class="source-block" hidden>
                            <div class="source-block-header">
                                <h3>引用来源</h3>
                                <p class="meta">根据本轮搜索结果生成</p>
                            </div>
                            <div id="sources-list" class="source-list"></div>
                        </div>
                        <div class="artifact-shell">
                            <div class="artifact-head">
                                <div>
                                    <h3>Markdown 文档</h3>
                                    <p class="meta">把当前答案转成可编辑文档。</p>
                                </div>
                                <button id="create-artifact" class="secondary small" type="button" disabled>生成 MD</button>
                            </div>
                            <div id="artifact-list" class="artifact-list">
                                <span class="placeholder">当前会话还没有文档。</span>
                            </div>
                            <div id="artifact-editor" class="artifact-editor hidden">
                                <input id="artifact-title" class="artifact-input" type="text" placeholder="文档标题" />
                                <textarea id="artifact-content" class="artifact-content" placeholder="Markdown 内容"></textarea>
                                <div class="artifact-actions">
                                    <button id="save-artifact" type="button">保存文档</button>
                                    <a id="download-artifact" class="secondary small" href="#" download>下载 MD</a>
                                </div>
                                <div id="artifact-preview" class="artifact-preview markdown-content"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="panel side-card">
                    <details id="logs-panel">
                        <summary class="panel-toggle">
                            <span>执行日志</span>
                            <span id="logs-count" class="panel-toggle-count">0</span>
                        </summary>
                        <div class="panel-body">
                            <div id="logs" class="stack"></div>
                        </div>
                    </details>
                </section>

                <section class="panel side-card">
                    <details id="results-panel">
                        <summary class="panel-toggle">
                            <span>搜索结果</span>
                            <span id="results-count" class="panel-toggle-count">0</span>
                        </summary>
                        <div class="panel-body">
                            <div id="results" class="stack"></div>
                        </div>
                    </details>
                </section>
            </div>
        </main>
    </div>

    <div class="floating-composer">
        <div class="composer-shell">
            <div class="composer-topline">
                <div class="composer-tools">
                    <button id="attach-trigger" class="secondary" type="button">+</button>
                    <p class="meta">支持 PDF / TXT / MD</p>
                </div>
            </div>
            <input id="file-input" type="file" accept=".pdf,.txt,.md" multiple class="hidden" />
            <div id="pending-attachments" class="attachment-bar">
                <span class="placeholder">未选择附件。</span>
            </div>
            <textarea id="question" placeholder="Ask anything"></textarea>
            <div class="composer-actions">
                <div>
                    <p id="status" class="meta composer-status"></p>
                    <p id="error" class="error"></p>
                </div>
                <button id="submit">发送问题</button>
            </div>
        </div>
    </div>

    <script>
        const submitButton = document.getElementById('submit');
        const newSessionButton = document.getElementById('new-session');
        const deleteSessionButton = document.getElementById('delete-session');
        const attachTrigger = document.getElementById('attach-trigger');
        const fileInput = document.getElementById('file-input');
        const questionInput = document.getElementById('question');
        const answerElement = document.getElementById('answer');
        const sourcesElement = document.getElementById('sources');
        const sourcesListElement = document.getElementById('sources-list');
        const logsElement = document.getElementById('logs');
        const resultsElement = document.getElementById('results');
        const logsCountElement = document.getElementById('logs-count');
        const resultsCountElement = document.getElementById('results-count');
        const logsPanel = document.getElementById('logs-panel');
        const resultsPanel = document.getElementById('results-panel');
        const statusElement = document.getElementById('status');
        const errorElement = document.getElementById('error');
        const conversationElement = document.getElementById('conversation');
        const sessionListElement = document.getElementById('session-list');
        const sessionMetaElement = document.getElementById('session-meta');
        const sessionAttachmentsElement = document.getElementById('session-attachments');
        const pendingAttachmentsElement = document.getElementById('pending-attachments');
        const createArtifactButton = document.getElementById('create-artifact');
        const artifactListElement = document.getElementById('artifact-list');
        const artifactEditorElement = document.getElementById('artifact-editor');
        const artifactTitleInput = document.getElementById('artifact-title');
        const artifactContentInput = document.getElementById('artifact-content');
        const artifactPreviewElement = document.getElementById('artifact-preview');
        const saveArtifactButton = document.getElementById('save-artifact');
        const downloadArtifactLink = document.getElementById('download-artifact');

        let currentSessionId = null;
        let currentSessionTitle = '新会话';
        let pendingFiles = [];
        let latestAnswerMarkdown = '';
        let currentArtifactId = null;

        function escapeHtml(value) {
            return value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }

        function setSessionMeta() {
            sessionMetaElement.textContent = `当前会话：${currentSessionTitle}`;
            deleteSessionButton.disabled = !currentSessionId;
            createArtifactButton.disabled = !(currentSessionId && latestAnswerMarkdown.trim());
        }

        function resetArtifactEditor() {
            currentArtifactId = null;
            artifactEditorElement.classList.add('hidden');
            artifactTitleInput.value = '';
            artifactContentInput.value = '';
            artifactPreviewElement.innerHTML = '<p class="placeholder">请选择文档。</p>';
            downloadArtifactLink.href = '#';
            downloadArtifactLink.setAttribute('download', 'document.md');
        }

        function renderArtifactPreview() {
            artifactPreviewElement.innerHTML = renderMarkdown(artifactContentInput.value);
        }

        function renderArtifactList(artifacts) {
            artifactListElement.innerHTML = '';
            if (!artifacts.length) {
                artifactListElement.innerHTML = '<span class="placeholder">当前会话还没有文档。</span>';
                return;
            }

            artifacts.forEach((artifact) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = `artifact-item${artifact.artifact_id === currentArtifactId ? ' active' : ''}`;
                item.textContent = artifact.title;
                item.addEventListener('click', () => loadArtifact(artifact.artifact_id));
                artifactListElement.appendChild(item);
            });
        }

        function renderSessionAttachments(attachments) {
            sessionAttachmentsElement.innerHTML = '';
            if (!attachments.length) {
                sessionAttachmentsElement.innerHTML = '<span class="placeholder">当前会话还没有附件。</span>';
                return;
            }

            attachments.forEach((attachment) => {
                const chip = document.createElement('span');
                chip.className = 'attachment-chip';
                chip.textContent = `${attachment.filename}`;
                sessionAttachmentsElement.appendChild(chip);
            });
        }

        function renderPendingFiles() {
            pendingAttachmentsElement.innerHTML = '';
            if (!pendingFiles.length) {
                pendingAttachmentsElement.innerHTML = '<span class="placeholder">未选择附件。</span>';
                return;
            }

            pendingFiles.forEach((file, index) => {
                const chip = document.createElement('span');
                chip.className = 'attachment-chip';
                chip.innerHTML = `
                    <span>${escapeHtml(file.name)}</span>
                    <button type="button" class="chip-remove" data-index="${index}">×</button>
                `;
                const removeButton = chip.querySelector('[data-index]');
                removeButton.addEventListener('click', () => {
                    pendingFiles = pendingFiles.filter((_, itemIndex) => itemIndex !== index);
                    renderPendingFiles();
                });
                pendingAttachmentsElement.appendChild(chip);
            });
        }

        function buildExpandableText(text, className = '') {
            const wrapper = document.createElement('div');
            const body = document.createElement('div');
            body.className = `clamped-text ${className}`.trim();
            body.textContent = text || '暂无摘要';
            wrapper.appendChild(body);

            if ((text || '').length > 88) {
                const toggle = document.createElement('button');
                toggle.type = 'button';
                toggle.className = 'text-toggle';
                toggle.textContent = '展开';
                toggle.addEventListener('click', () => {
                    const expanded = body.classList.toggle('expanded');
                    toggle.textContent = expanded ? '收起' : '展开';
                });
                wrapper.appendChild(toggle);
            }

            return wrapper;
        }

        function renderMarkdown(markdownText) {
            if (!markdownText) {
                return '<p class="placeholder">暂无答案。</p>';
            }
            if (window.marked && window.DOMPurify) {
                return window.DOMPurify.sanitize(window.marked.parse(markdownText));
            }
            return `<p>${escapeHtml(markdownText).replaceAll('\n', '<br />')}</p>`;
        }

        function resetRoundOutput() {
            answerElement.innerHTML = '<p class="placeholder">等待提问...</p>';
            sourcesElement.hidden = true;
            sourcesListElement.innerHTML = '';
            renderLogs([]);
            renderResults([]);
            statusElement.textContent = '';
            errorElement.textContent = '';
        }

        function startNewSession() {
            currentSessionId = null;
            currentSessionTitle = '新会话';
            questionInput.value = '';
            pendingFiles = [];
            latestAnswerMarkdown = '';
            conversationElement.innerHTML = '<div class="placeholder">还没有对话记录，发送第一条消息后会自动创建会话。</div>';
            resetRoundOutput();
            setSessionMeta();
            renderSessionAttachments([]);
            renderPendingFiles();
            renderArtifactList([]);
            resetArtifactEditor();
        }

        function renderLogs(logs) {
            logsElement.innerHTML = '';
            logsCountElement.textContent = String(logs.length);
            if (!logs.length) {
                logsElement.innerHTML = '<div class="placeholder">当前没有执行日志。</div>';
                logsPanel.open = false;
                return;
            }
            logs.forEach((log) => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.textContent = `[${log.stage}] ${log.message}`;
                logsElement.appendChild(item);
            });
        }

        function renderResults(results) {
            resultsElement.innerHTML = '';
            resultsCountElement.textContent = String(results.length);
            if (!results.length) {
                resultsElement.innerHTML = '<div class="placeholder">当前没有搜索结果。</div>';
                resultsPanel.open = false;
                return;
            }
            results.forEach((result) => {
                const item = document.createElement('div');
                item.className = 'result-item';

                const title = document.createElement('strong');
                title.textContent = result.title || '未命名来源';
                item.appendChild(title);

                item.appendChild(buildExpandableText(result.snippet || '暂无摘要', 'meta'));

                const linkRow = document.createElement('div');
                const link = document.createElement('a');
                link.href = result.url || '#';
                link.target = '_blank';
                link.rel = 'noreferrer';
                link.textContent = result.url || '无链接';
                linkRow.appendChild(link);
                item.appendChild(linkRow);

                resultsElement.appendChild(item);
            });
        }

        function renderSources(results) {
            sourcesListElement.innerHTML = '';
            if (!results.length) {
                sourcesElement.hidden = true;
                return;
            }

            results.forEach((result, index) => {
                const item = document.createElement('div');
                item.className = 'source-item';

                const titleRow = document.createElement('div');
                titleRow.className = 'source-title-row';
                titleRow.innerHTML = `
                    <span class="source-index">${index + 1}</span>
                    <span class="source-title">${escapeHtml(result.title || '未命名来源')}</span>
                `;
                item.appendChild(titleRow);
                item.appendChild(buildExpandableText(result.snippet || '暂无摘要', 'source-snippet'));

                const meta = document.createElement('div');
                meta.className = 'meta';
                const link = document.createElement('a');
                link.href = result.url || '#';
                link.target = '_blank';
                link.rel = 'noreferrer';
                link.textContent = result.url || '无链接';
                meta.appendChild(link);
                item.appendChild(meta);

                sourcesListElement.appendChild(item);
            });
            sourcesElement.hidden = false;
        }

        function renderConversation(messages) {
            conversationElement.innerHTML = '';
            if (!messages.length) {
                conversationElement.innerHTML = '<div class="placeholder">当前会话为空。</div>';
                return;
            }

            messages.forEach((message) => {
                const item = document.createElement('div');
                item.className = `message ${message.role}`;
                const renderedContent = message.role === 'assistant'
                    ? `<div class="markdown-content">${renderMarkdown(message.content)}</div>`
                    : `<div class="message-content">${escapeHtml(message.content)}</div>`;
                item.innerHTML = `
                    <div class="message-role">
                        <span>${message.role === 'user' ? '用户' : 'Assistant'}</span>
                        <span>${escapeHtml(message.created_at)}</span>
                    </div>
                    ${renderedContent}
                `;
                conversationElement.appendChild(item);
            });
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                if (!response.ok) {
                    throw new Error('加载会话失败');
                }
                const sessions = await response.json();
                renderSessionList(sessions);
            } catch (error) {
                sessionListElement.innerHTML = `<div class="placeholder">${error.message || '加载会话失败'}</div>`;
            }
        }

        async function loadArtifacts(sessionId, { openLatest = false } = {}) {
            if (!sessionId) {
                renderArtifactList([]);
                resetArtifactEditor();
                return;
            }

            const response = await fetch(`/api/sessions/${sessionId}/artifacts`);
            if (!response.ok) {
                throw new Error('加载文档失败');
            }
            const artifacts = await response.json();
            renderArtifactList(artifacts);
            if (!artifacts.length) {
                resetArtifactEditor();
                return;
            }

            if (openLatest || !currentArtifactId || !artifacts.some((item) => item.artifact_id === currentArtifactId)) {
                await loadArtifact(artifacts[0].artifact_id);
            } else {
                renderArtifactList(artifacts);
            }
        }

        async function loadArtifact(artifactId) {
            if (!currentSessionId) {
                return;
            }
            const response = await fetch(`/api/sessions/${currentSessionId}/artifacts/${artifactId}`);
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.detail || '加载文档失败');
            }
            currentArtifactId = data.artifact_id;
            artifactEditorElement.classList.remove('hidden');
            artifactTitleInput.value = data.title;
            artifactContentInput.value = data.content;
            downloadArtifactLink.href = `/api/sessions/${currentSessionId}/artifacts/${artifactId}/download`;
            downloadArtifactLink.setAttribute('download', data.filename);
            renderArtifactPreview();
            const listResponse = await fetch(`/api/sessions/${currentSessionId}/artifacts`);
            if (listResponse.ok) {
                renderArtifactList(await listResponse.json());
            }
        }

        function renderSessionList(sessions) {
            sessionListElement.innerHTML = '';
            if (!sessions.length) {
                sessionListElement.innerHTML = '<div class="placeholder">还没有历史会话。</div>';
                return;
            }

            sessions.forEach((session) => {
                const item = document.createElement('div');
                item.className = `session-item${session.session_id === currentSessionId ? ' active' : ''}`;
                item.addEventListener('click', () => loadSessionDetail(session.session_id));
                item.innerHTML = `
                    <div class="session-item-head">
                        <div class="session-title">${escapeHtml(session.title)}</div>
                        <button class="danger small" data-session-id="${escapeHtml(session.session_id)}">删除</button>
                    </div>
                    <div class="session-preview">${escapeHtml(session.last_message_preview || '暂无摘要')}</div>
                    <div class="session-time">${escapeHtml(session.updated_at)}</div>
                `;
                const deleteButton = item.querySelector('[data-session-id]');
                deleteButton.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    await deleteSession(session.session_id);
                });
                sessionListElement.appendChild(item);
            });
        }

        async function loadSessionDetail(sessionId) {
            errorElement.textContent = '';
            try {
                const response = await fetch(`/api/sessions/${sessionId}`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || '加载会话失败');
                }

                currentSessionId = data.session_id;
                currentSessionTitle = data.title;
                latestAnswerMarkdown = data.messages?.length
                    ? String(data.messages[data.messages.length - 1].content || '')
                    : '';
                setSessionMeta();
                renderConversation(data.messages || []);
                answerElement.innerHTML = data.messages?.length
                    ? renderMarkdown(data.messages[data.messages.length - 1].content)
                    : '<p class="placeholder">等待提问...</p>';
                renderLogs(data.latest_logs || []);
                renderResults(data.latest_search_results || []);
                renderSources(data.latest_search_results || []);
                renderSessionAttachments(data.attachments || []);
                await loadArtifacts(data.session_id);
                statusElement.textContent = `已加载会话：${data.title}`;
                await loadSessions();
            } catch (error) {
                errorElement.textContent = error.message || '加载会话失败';
            }
        }

        async function deleteSession(sessionId) {
            errorElement.textContent = '';
            try {
                const response = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || '删除会话失败');
                }

                if (currentSessionId === sessionId) {
                    startNewSession();
                }
                await loadSessions();
            } catch (error) {
                errorElement.textContent = error.message || '删除会话失败';
            }
        }

        async function handleSubmit() {
            const question = questionInput.value.trim();
            errorElement.textContent = '';
            if (!question) {
                errorElement.textContent = '请输入问题';
                return;
            }

            submitButton.disabled = true;
            statusElement.textContent = '执行中...';
            answerElement.innerHTML = '<p class="placeholder">处理中...</p>';
            sourcesElement.hidden = true;
            sourcesListElement.innerHTML = '';
            renderLogs([]);
            renderResults([]);

            try {
                const formData = new FormData();
                formData.append('question', question);
                if (currentSessionId) {
                    formData.append('session_id', currentSessionId);
                }
                pendingFiles.forEach((file) => {
                    formData.append('files', file, file.name);
                });

                const response = await fetch('/api/ask/stream', {
                    method: 'POST',
                    body: formData,
                });
                if (!response.ok) {
                    const text = await response.text();
                    let detail = '请求失败';
                    try {
                        detail = JSON.parse(text).detail || detail;
                    } catch {
                        detail = text || detail;
                    }
                    throw new Error(detail);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let liveLogs = [];

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.trim()) {
                            continue;
                        }

                        const event = JSON.parse(line);
                        if (event.type === 'status') {
                            statusElement.textContent = event.message || '';
                        } else if (event.type === 'log') {
                            liveLogs.push(event.log);
                            renderLogs(liveLogs);
                            logsPanel.open = true;
                        } else if (event.type === 'results') {
                            renderResults(event.results || []);
                            renderSources(event.results || []);
                            if ((event.results || []).length) {
                                resultsPanel.open = true;
                            }
                        } else if (event.type === 'attachments') {
                            renderSessionAttachments(event.attachments || []);
                        } else if (event.type === 'final') {
                            const data = event.data;
                            currentSessionId = data.session_id;
                            currentSessionTitle = data.session_title;
                            latestAnswerMarkdown = data.answer || '';
                            setSessionMeta();
                            answerElement.innerHTML = renderMarkdown(data.answer);
                            renderConversation(data.conversation || []);
                            renderLogs(data.logs || []);
                            renderResults(data.search_results || []);
                            renderSources(data.search_results || []);
                            renderSessionAttachments(data.attachments || []);
                            statusElement.textContent = data.need_search
                                ? `已完成，触发搜索：${data.query || ''}`
                                : '已完成，未触发搜索';
                            questionInput.value = '';
                            pendingFiles = [];
                            renderPendingFiles();
                            await loadArtifacts(data.session_id);
                            await loadSessions();
                        } else if (event.type === 'error') {
                            throw new Error(event.message || '发生未知错误');
                        }
                    }
                }
            } catch (error) {
                answerElement.innerHTML = '<p class="placeholder">请求失败</p>';
                errorElement.textContent = error.message || '发生未知错误';
            } finally {
                submitButton.disabled = false;
            }
        }

        submitButton.addEventListener('click', handleSubmit);

        newSessionButton.addEventListener('click', startNewSession);
        deleteSessionButton.addEventListener('click', async () => {
            if (!currentSessionId) {
                return;
            }
            await deleteSession(currentSessionId);
        });

        attachTrigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            const allowed = ['.pdf', '.txt', '.md'];
            const chosen = Array.from(fileInput.files || []).filter((file) =>
                allowed.some((suffix) => file.name.toLowerCase().endsWith(suffix))
            );
            pendingFiles = [...pendingFiles, ...chosen];
            renderPendingFiles();
            fileInput.value = '';
        });
        questionInput.addEventListener('keydown', (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                event.preventDefault();
                handleSubmit();
            }
        });
        artifactContentInput.addEventListener('input', renderArtifactPreview);
        createArtifactButton.addEventListener('click', async () => {
            if (!currentSessionId || !latestAnswerMarkdown.trim()) {
                return;
            }
            try {
                const response = await fetch(`/api/sessions/${currentSessionId}/artifacts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: `${currentSessionTitle} 文档`,
                        content: latestAnswerMarkdown,
                    }),
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || '创建文档失败');
                }
                currentArtifactId = data.artifact_id;
                await loadArtifacts(currentSessionId, { openLatest: true });
            } catch (error) {
                errorElement.textContent = error.message || '创建文档失败';
            }
        });
        saveArtifactButton.addEventListener('click', async () => {
            if (!currentSessionId || !currentArtifactId) {
                return;
            }
            try {
                const response = await fetch(`/api/sessions/${currentSessionId}/artifacts/${currentArtifactId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: artifactTitleInput.value,
                        content: artifactContentInput.value,
                    }),
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || '保存文档失败');
                }
                currentArtifactId = data.artifact_id;
                artifactTitleInput.value = data.title;
                artifactContentInput.value = data.content;
                downloadArtifactLink.href = `/api/sessions/${currentSessionId}/artifacts/${currentArtifactId}/download`;
                downloadArtifactLink.setAttribute('download', data.filename);
                renderArtifactPreview();
                await loadArtifacts(currentSessionId);
            } catch (error) {
                errorElement.textContent = error.message || '保存文档失败';
            }
        });

        startNewSession();
        renderLogs([]);
        renderResults([]);
        renderPendingFiles();
        loadSessions();
    </script>
</body>
</html>
